<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#09090b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Treino App">
  <title>Treino em Casa</title>
  <meta name="description" content="Sistema minimalista de treino em casa">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-black text-white">
  <div class="page-shell" id="app">
    <!-- Hidden Elements needed by JS -->
    <div style="display:none;" id="hidden-js-elements">
      <div id="weeklyPlan"></div>
      <strong id="weeklyTargetLabel">4 sessões</strong>
      <div id="presetGrid"></div>
      <div id="goalControls"></div>
      <div id="levelControls"></div>
      <input id="durationRange" type="range" min="15" max="60" step="5" value="30">
      <strong id="durationLabel">30 min</strong>
      <div id="energyControls"></div>
      <button id="shuffleWorkout"></button>
      <button id="completeSession"></button>
      <div id="focusBand"></div>
      <h3 id="sessionTitle"></h3>
      <span id="sessionMeta"></span>
      <div id="sessionBlocks"></div>
      <strong id="timerDisplay"></strong>
      <p id="timerHint"></p>
      <button id="toggleTimer"></button>
      <button id="resetTimer"></button>
      <button id="nextBlock"></button>
      <h3 id="coachTitle"></h3>
      <p id="coachText"></p>
      <div id="libraryFilterControls"></div>
      <button id="startGuidedWorkout"></button>
      <button id="installApp"></button>
      <button id="resetApp"></button>
    </div>

    <!-- MAIN HOME VIEW -->
    <main id="screen-home" class="screen active">
      <header class="topbar">
        <div class="brand-mark">TRNO</div>
      </header>

      <section class="hero active" id="dashboard">
        <div class="hero-copy">
          <p class="eyebrow">Plano Diario</p>
          <h1>Treino de Corpo Inteiro 30 min</h1>
          <p class="hero-text">
            Força com halteres + calistenia. Clique iniciar e acompanhe sem pensar e sem rolar a tela.
          </p>

          <div class="hero-actions">
            <!-- This triggers the guided workout in JS -->
            <button class="primary-button" id="startRoutineHero" type="button">INICIAR TREINO DO DIA</button>
          </div>

          <div class="hero-stats" id="heroStats"></div>
        </div>
      </section>

      <section class="library" id="library">
        <h2 style="font-weight: 800; font-family: 'Space Grotesk'; color: var(--accent); margin-bottom: 24px;">BIBLIOTECA</h2>
        <input id="exerciseSearch" type="search" placeholder="Buscar exercício..." style="width: 100%; padding: 16px; border-radius: var(--radius-lg); border: 2px solid var(--line); background: var(--surface); color: var(--text); font-size: 1rem; margin-bottom: 24px;">
        <div class="exercise-grid" id="exerciseGrid" style="display: grid; gap: 16px;"></div>
      </section>

      <section class="progress" id="progress">
        <h2 style="font-weight: 800; font-family: 'Space Grotesk'; color: var(--accent); margin-bottom: 24px;">PROGRESSO</h2>
        
        <div style="background: var(--surface); padding: 24px; border-radius: var(--radius-xl); margin-bottom: 24px;">
          <p class="eyebrow" style="color: var(--accent)">Consistencia</p>
          <h3 id="consistencyTitle" style="font-size: 1.5rem; margin-bottom: 8px;">0 concluidos</h3>
          <span id="consistencyBadge" style="font-weight: 800; color: var(--muted)">0%</span>
          <div class="bar-track" style="height: 8px; margin-top: 16px; background: var(--line)">
            <div class="bar-fill" id="consistencyFill" style="background: var(--accent)"></div>
          </div>
        </div>

        <div class="week-bars" id="weekBars" style="display: flex; gap: 8px; justify-content: space-between; margin-bottom: 32px; overflow-x: auto; padding-bottom: 8px;"></div>
        
        <div id="progressOverview" style="display: flex; gap: 12px; overflow-x: auto; padding-bottom: 16px;"></div>
        
        <h3 style="font-size: 1.2rem; margin-bottom: 16px;">Historico</h3>
        <div class="history-list" id="historyList" style="display: grid; gap: 12px;"></div>
      </section>
    </main>

    <!-- BOTTOM NAV FOR PWA FEEL (JS WILL BE NEEDED TO SWITCH PANELS) -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-btn active" onclick="switchView('dashboard')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Treino</span>
      </button>
      <button class="nav-btn" onclick="switchView('library')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        <span>Buscador</span>
      </button>
      <button class="nav-btn" onclick="switchView('progress')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
        <span>Progresso</span>
      </button>
    </nav>
  </div>

  <!-- GUIDED FULLSCREEN MODAL -->
  <div class="guided-modal" id="guidedModal" aria-hidden="true">
    <div class="guided-backdrop" id="guidedBackdrop"></div>
    <section class="guided-dialog" role="dialog" aria-modal="true" aria-labelledby="guidedTitle">
      <button class="guided-close" id="guidedClose" type="button" aria-label="Fechar treino">Fechar</button>

      <div class="guided-progress">
        <span id="guidedStepLabel">Exercicio 1 de 6</span>
        <div class="bar-track">
          <div class="bar-fill" id="guidedProgressFill"></div>
        </div>
      </div>

      <div class="guided-media">
        <img id="guidedImage" alt="" src="">
        <iframe id="guidedVideo" title="Video" loading="lazy" allow="autoplay; fullscreen; picture-in-picture; clipboard-write"></iframe>
      </div>

      <div class="guided-content">
        <span id="guidedBlock"></span>
        <h2 id="guidedTitle"></h2>
        
        <div class="guided-hud">
          <div class="guided-hud-card">
            <span class="label" id="guidedPhaseLabel" style="color: var(--muted); font-size: 0.9rem; font-weight: 700; text-transform: uppercase;">Pronto</span><br>
            <span id="guidedPhaseTime">00:45</span><br>
            <span id="guidedSetLabel" style="color: var(--muted); font-size: 0.9rem;">Set 1 de 3</span>
          </div>
        </div>

        <!-- Hidden elements needed for JS logic -->
        <p id="guidedDescription"></p>
        <div id="guidedMetrics"></div>
        <div id="guidedNextUp"></div>
        <div id="guidedVoiceStatus"></div>
        <div id="guidedSessionTime"></div>
        <div id="guidedSessionMeta"></div>
        <div id="guidedPhaseHint"></div>
        <ul id="guidedSteps"></ul>
        <ul id="guidedTips"></ul>

        <div class="guided-prompt-panel" id="guidedPromptPanel" hidden>
          <strong id="guidedPromptCurrent"></strong>
          <p id="guidedPromptDescription" style="color: var(--muted); font-size: 0.9rem; max-width: 300px; margin: 8px auto 0;"></p>
        </div>

        <div class="guided-actions">
          <button id="guidedToggleSession" type="button">INICIAR SESSÃO</button>
          
          <div style="display: flex; gap: 8px;">
            <button class="secondary-button" id="guidedPrev" type="button">Anterior</button>
            <button class="secondary-button" id="guidedNext" type="button">Prox</button>
          </div>
          
          <button class="ghost-button" id="guidedRestartSession" type="button" style="margin-top: 16px;">Reiniciar</button>
          <button class="ghost-button" id="guidedVoiceToggle" type="button" style="display:none;">Ativar voz</button>
          <a class="ghost-button" id="guidedSource" target="_blank" rel="noreferrer" style="display:none;">Abrir fonte</a>
          <button id="guidedSkipPhase" type="button" style="display:none;"></button>
        </div>
      </div>
    </section>
  </div>

  <script>
    // Simple inline logic for view switching to keep it fast and separate from the 3.5k line script.js
    function switchView(viewId) {
      document.getElementById('dashboard').classList.remove('active');
      document.getElementById('library').classList.remove('active');
      document.getElementById('progress').classList.remove('active');
      
      document.getElementById(viewId).classList.add('active');
      
      const buttons = document.querySelectorAll('.nav-btn');
      buttons.forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }
  </script>
  <script src="./script.js"></script>
</body>
</html>
